# Friendly application name used by Spring in logs and diagnostics.
spring.application.name=E2EE-CHATAPP

# Railway (and most PaaS providers) inject a PORT env var. Fall back to 8080 locally.
server.port=${PORT:8080}

# Comma-separated allowed origins for WebSocket CORS.
# In production set: ALLOWED_ORIGINS=https://your-app.vercel.app
allowed.origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080}

# MongoDB — set MONGODB_URI env var in production (Render).
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/e2eechatapp}

# LiveKit credentials — fall back to dev values locally.
# In production, set LIVEKIT_URL, LIVEKIT_API_KEY, LIVEKIT_API_SECRET as env vars.
livekit.url=${LIVEKIT_URL:wss://e2ee-chat-app-4wy69lpv.livekit.cloud}
livekit.api-key=${LIVEKIT_API_KEY:APItb7GDdoYteLh}
livekit.api-secret=${LIVEKIT_API_SECRET:ff9ZxIoi7eALIVnaF4zGvlKTUMC3E38lOurS3z1iPkpB}
